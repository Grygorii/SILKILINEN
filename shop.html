<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <title>Shop — SILKILINEN</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/sections.css">
</head>
<body>

  <nav id="mainNav">
    <div class="nav-hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="nav-logo">
      <h1>SILKILINEN</h1>
      <p>Silk &amp; Linen</p>
    </div>
    <div class="nav-cart">
      <p>Cart (0)</p>
    </div>
  </nav>

  <div class="menu-overlay" id="menuOverlay"></div>
  <div class="side-menu" id="sideMenu">
    <button class="menu-close" id="menuClose">✕</button>
    <nav class="menu-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </div>

  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-panel" id="cartPanel">
    <div class="cart-panel-header">
      <h3>Your cart</h3>
      <button class="cart-close" id="cartClose">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer" id="cartFooter">
      <div class="cart-total">
        <span>Total</span>
        <span id="cartTotal">€0.00</span>
      </div>
      <button class="cart-checkout">Checkout</button>
    </div>
  </div>
<section class="shop-page">

  <div class="shop-header">
    <h2>All products</h2>
    <p>Handpicked silk & linen pieces</p>
  </div>

<div class="shop-filters">
  <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
  <button class="filter-btn" onclick="filterProducts('shorts', this)">Shorts</button>
  <button class="filter-btn" onclick="filterProducts('dresses', this)">Dresses</button>
  <button class="filter-btn" onclick="filterProducts('robes', this)">Robes</button>
  <button class="filter-btn" onclick="filterProducts('shirts', this)">Shirts</button>
  <button class="filter-btn" onclick="filterProducts('scarves', this)">Scarves</button>
</div>

  <div class="products-grid" id="productsGrid">
  </div>

</section>

  <script src="js/menu.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
